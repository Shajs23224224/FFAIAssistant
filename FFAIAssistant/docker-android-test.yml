# Docker Compose para testing de FFAIAssistant en Android Emulator
# Requiere: Docker + KVM (/dev/kvm accesible)
# Uso: docker-compose -f docker-android-test.yml up

version: '3.8'

services:
  # Emulador Android con API 30 (Android 11)
  android-emulator:
    image: budtmo/docker-android:emulator_11.0
    container_name: ffai-android-emulator
    privileged: true
    ports:
      - "6080:6080"  # noVNC web interface
      - "5554:5554"  # ADB
      - "5555:5555"  # ADB
    environment:
      - DEVICE=Samsung Galaxy S10
      - EMULATOR_DEVICE="Samsung Galaxy S10"
      - WEB_VNC=true
      - EMULATOR_NO_AUDIO=1
      - EMULATOR_ARGS=-no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
    volumes:
      - /dev/kvm:/dev/kvm
      - ./app/build/outputs/apk/release:/app/apk:ro
    networks:
      - ffai-test

  # Servidor de build para compilar el APK
  android-builder:
    image: mingc/android-build-box:latest
    container_name: ffai-android-builder
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    working_dir: /project
    command: >
      sh -c "
        echo 'Compilando FFAIAssistant APK...' &&
        ./gradlew assembleRelease --no-daemon 2>&1 | tee build.log &&
        echo 'Build completado. APK en app/build/outputs/apk/release/'
      "
    networks:
      - ffai-test

  # Instalador automático del APK
  apk-installer:
    image: budtmo/docker-android:emulator_11.0
    container_name: ffai-apk-installer
    depends_on:
      - android-emulator
    volumes:
      - ./app/build/outputs/apk/release:/app/apk:ro
      - ./scripts/install-apk.sh:/install-apk.sh:ro
    command: >
      sh -c "
        echo 'Esperando emulador...' &&
        sleep 60 &&
        adb connect android-emulator:5555 &&
        adb wait-for-device &&
        echo 'Instalando APK...' &&
        adb install -r /app/apk/app-release.apk &&
        echo 'APK instalada correctamente'
      "
    networks:
      - ffai-test

volumes:
  gradle-cache:

networks:
  ffai-test:
    driver: bridge
