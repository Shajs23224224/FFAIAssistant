# Blueprint Render.com: ajusta el nombre del servicio y la rama.
services:
  - type: web
    name: tactical-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TACTICAL_AI_API_KEYS
        sync: false
      - key: CORS_ORIGINS
        value: ""
      - key: ENABLE_MOBILE_WS_ROUTES
        value: "false"
      - key: ENABLE_GAME_INTELLIGENCE
        value: "false"
