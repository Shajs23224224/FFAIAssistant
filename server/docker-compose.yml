version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffai-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"  # Solo local, nginx hace proxy
    environment:
      - REDIS_URL=redis://redis:6379
      - ENV=production
      - LOG_LEVEL=INFO
      - MAX_WORKERS=2
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    networks:
      - ffai-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: ffai-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - ffai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: ffai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/www:/var/www/html:ro
    depends_on:
      - api
    networks:
      - ffai-network

networks:
  ffai-network:
    driver: bridge

volumes:
  redis-data:
