name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: List project files
      run: |
        echo "=== Project structure ==="
        ls -la
        echo ""
        echo "=== Gradle wrapper ==="
        ls -la gradle/wrapper/
        echo ""
        echo "=== Build files ==="
        cat build.gradle.kts
        echo ""
        cat settings.gradle.kts
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log
      continue-on-error: true
      
    - name: Check build status
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
        fi
      
    - name: List build outputs
      run: |
        echo "=== Build outputs ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK output directory"
        ls -la app/build/ 2>/dev/null || echo "No build directory"
      
    - name: Upload APK
      if: env.BUILD_SUCCESS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: FFAIAssistant
        path: app/build/outputs/apk/debug/*.apk
        
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_output.log
          app/build/reports/
          ~/.gradle/daemon/*/daemon-*.out.log
