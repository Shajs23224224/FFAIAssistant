name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
      
    - name: List project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo ""
        echo "=== Gradle Files ==="
        ls -la gradle/wrapper/
        echo ""
        echo "=== App Directory ==="
        ls -la app/ 2>/dev/null || echo "No app directory"
        
    - name: Build with Gradle
      run: ./gradlew assembleDebug --info --stacktrace
      timeout-minutes: 30
      
    - name: Verify Build Outputs
      run: |
        echo "=== Checking Build Outputs ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== APK Directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directory not found"
        echo ""
        echo "=== Build Directory Structure ==="
        ls -R app/build/outputs/ 2>/dev/null || echo "No outputs directory"
      
    - name: Rename APK with version
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/FFAIAssistant-v3.0-Colab.apk
          echo "✅ APK renamed successfully"
        fi
      
    - name: Upload APK Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: FFAIAssistant-APK-v3.0
        path: |
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
        
    - name: Upload Build Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/build/outputs/logs/
        if-no-files-found: ignore
        retention-days: 7
        
    - name: Show Kotlin Compile Errors
      if: failure()
      run: |
        echo "========================================"
        echo "      KOTLIN COMPILATION ERRORS"
        echo "========================================"
        # Buscar logs de compilación de Kotlin
        find app/build -name "*.log" -type f 2>/dev/null | head -10
        # Mostrar errores de compileDebugKotlin
        cat app/build/outputs/logs/*.log 2>/dev/null || true
        # Mostrar output de Gradle con errores
        ls -la app/build/outputs/ 2>/dev/null || true
        # Buscar archivos con problemas
        echo ""
        echo "=== Verifying Kotlin Files ==="
        find app/src/main/java -name "*.kt" -type f | wc -l
        echo "Kotlin files found"

    - name: Build Status Summary
      if: always()
      run: |
        echo "========================================"
        echo "         BUILD SUMMARY"
        echo "========================================"
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✅ BUILD SUCCESSFUL"
          echo "📱 APK Location: app/build/outputs/apk/debug/app-debug.apk"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ BUILD FAILED - APK not found"
        fi
        echo "========================================"
