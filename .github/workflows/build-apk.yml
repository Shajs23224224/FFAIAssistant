name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2
    
    - name: Build Debug APK
      if: github.event.inputs.build_type != 'release'
      run: ./gradlew assembleDebug --stacktrace
      env:
        CI: true
    
    - name: Build Release APK
      if: github.event.inputs.build_type == 'release'
      run: ./gradlew assembleRelease --stacktrace
      env:
        CI: true
        ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    
    - name: Get APK info
      id: apk_info
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
        else
          echo "APK not found"
          exit 1
        fi
        
        APK_SIZE=$(stat -c%s "$APK_PATH")
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
        echo "APK size: $((APK_SIZE / 1024 / 1024)) MB"
        
        # Check if APK is under 100MB GitHub limit
        if [ $APK_SIZE -gt 104857600 ]; then
          echo "WARNING: APK exceeds 100MB GitHub limit"
        fi
    
    - name: Upload Debug APK
      if: github.event.inputs.build_type != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Upload Release APK
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Analyze APK
      run: |
        if command -v aapt &> /dev/null; then
          echo "=== APK Contents ==="
          unzip -l ${{ steps.apk_info.outputs.apk_path }} | tail -20
          
          echo "=== Native Libraries ==="
          unzip -l ${{ steps.apk_info.outputs.apk_path }} | grep "\.so" || echo "No native libs found"
        fi
    
    - name: Report Build Status
      if: always()
      run: |
        echo "Build completed with status: ${{ job.status }}"
        echo "APK Path: ${{ steps.apk_info.outputs.apk_path }}"
        echo "APK Size: $(( ${{ steps.apk_info.outputs.apk_size }} / 1024 / 1024 )) MB"
